# Nginx configuration for Rumi
# Place this file in /etc/nginx/conf.d/rumi.conf

# WebSocket upgrade support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name rumi.website;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name rumi.website;
    # http2 on;

    ssl_certificate /etc/ssl/certs/rumi.website.pem;
    ssl_certificate_key /etc/ssl/certs/rumi.website.key;

    location = /rumi {
        return 301 /rumi/;
    }

    location /rumi/ {
        proxy_pass         http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        client_max_body_size 200m;
    }

    # WeWeRSS — proxy 到 :4000 根路径，前缀由 SERVER_ORIGIN_URL 控制
    location = /wewerss {
        return 301 /wewerss/;
    }
    location /wewerss/ {
        proxy_pass         http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        client_max_body_size 50m;
    }
}

