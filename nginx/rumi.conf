# Nginx configuration for Rumi
# Place this file in /etc/nginx/conf.d/rumi.conf

# WebSocket upgrade support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP server
server {
    listen 80;
    server_name rumi.website;  # 换成你的真实域名

    location = /rumi {
        return 301 /rumi/;
    }

    location /rumi/ {
        proxy_pass         http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        client_max_body_size 200m;
    }

    # Redirect /dash and all sub-paths to /wewerss
    location ~ ^/dash(/.*)?$ {
        return 301 /wewerss$1;
    }

    # WeWeRSS endpoint - redirect /wewerss to /wewerss/
    location = /wewerss {
        return 301 /wewerss/;
    }

    # WeWeRSS main location - proxy to localhost:4000/dash
    location /wewerss/ {
        proxy_pass         http://127.0.0.1:4000/dash/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        client_max_body_size 50m;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name rumi.website;  # 换成你的域名
    # http2 on;

    # Certbot 生成的证书路径
    # ssl_certificate     /etc/letsencrypt/live/a.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/a.com/privkey.pem;
    ssl_certificate /etc/ssl/certs/rumi.website.pem;
    ssl_certificate_key /etc/ssl/certs/rumi.website.key;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location = /rumi {
        return 301 /rumi/;
    }

    location /rumi/ {
        proxy_pass         http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        client_max_body_size 200m;
    }

    # Redirect /dash and all sub-paths to /wewerss
    location ~ ^/dash(/.*)?$ {
        return 301 /wewerss$1;
    }

    # WeWeRSS endpoint - redirect /wewerss to /wewerss/
    location = /wewerss {
        return 301 /wewerss/;
    }

    # WeWeRSS main location - proxy to localhost:4000/dash
    location /wewerss/ {
        proxy_pass         http://127.0.0.1:4000/dash/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        client_max_body_size 50m;
    }
}

