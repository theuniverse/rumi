version: "3.9"

services:

  # ── WeWeRSS MySQL 数据库 ───────────────────────────────────────────────────
  wewe-rss-db:
    image: mysql:8.0
    container_name: rumi_wewe_rss_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${WEWE_DB_PASSWORD:-wewe_rss_pass}
      MYSQL_DATABASE: wewe_rss
      MYSQL_ROOT_HOST: "%"
    volumes:
      - wewe_rss_db:/var/lib/mysql
    networks:
      - rumi_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${WEWE_DB_PASSWORD:-wewe_rss_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── WeWeRSS (企业微信驱动的微信公众号 RSS 服务) ────────────────────────────
  #
  #  初次使用需要配置：
  #    1. 访问 http://HOST:4000，用 WEWE_AUTH_CODE 登录
  #    2. 扫码绑定企业微信账号
  #    3. 在 Web UI 中搜索并订阅目标公众号
  #    4. 订阅后在 Sources 页面添加 rsshub_path = /feeds/{mpId}.xml
  #
  wewe-rss:
    image: cooderl/wewe-rss:latest
    container_name: rumi_wewe_rss
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:${WEWE_DB_PASSWORD:-wewe_rss_pass}@wewe-rss-db:3306/wewe_rss
      AUTH_CODE: ${WEWE_AUTH_CODE:-changeme_wewe}
      SERVER_ORIGIN_URL: ${WEWE_SERVER_ORIGIN_URL:-https://rumi.website/wewerss}
      MAX_ITEMS_PER_FEED: "20"
      CRON_EXPRESSION: "35 5,17 * * *"
      ENABLE_FEED_AUTH: "false"
    ports:
      - "4000:4000"   # 管理 Web UI — 初始设置完成后可注释掉此行
    networks:
      - rumi_internal
    depends_on:
      wewe-rss-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Event Scraper (FastAPI + SQLite + APScheduler) ─────────────────────────
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: rumi_scraper
    restart: unless-stopped
    env_file:
      - ./scraper/.env
    volumes:
      - scraper_data:/app/data
    networks:
      - rumi_internal
    depends_on:
      wewe-rss:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rumi_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - rumi_storage:/app/storage
    networks:
      - rumi_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Frontend (nginx + React SPA) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rumi_frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - rumi_storage:/app/storage:ro
    networks:
      - rumi_internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  rumi_storage:
    driver: local
  scraper_data:
    driver: local
  wewe_rss_db:
    driver: local

networks:
  rumi_internal:
    driver: bridge
