<!DOCTYPE html>
<html lang="zh" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Rumi</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        background-color: #0c0c0c;
        color: #f0f0f0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        text-align: center;
        max-width: 400px;
      }

      .logo {
        width: 80px;
        height: 80px;
        background: #c8b89a;
        border-radius: 12px;
        margin: 0 auto 24px;
        opacity: 0.9;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        color: #f0f0f0;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }

      p {
        font-size: 14px;
        color: #8a8a8a;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .button {
        display: inline-block;
        background: #c8b89a;
        color: #0c0c0c;
        padding: 12px 24px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        transition: background 0.2s;
      }

      .button:hover {
        background: #d4c4a6;
      }

      .status {
        margin-top: 24px;
        padding: 12px;
        background: #141414;
        border: 1px solid #262626;
        border-radius: 8px;
        font-size: 12px;
        color: #8a8a8a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo"></div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection.
        Some features may not be available until you're back online.
      </p>
      <a href="/" class="button" onclick="window.location.reload(); return false;">
        Try Again
      </a>
      <div class="status">
        <strong>Offline Mode</strong><br />
        Cached data is still available
      </div>
    </div>
  </body>
</html>
