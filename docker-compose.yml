version: "3.9"

services:

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rumi_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - rumi_storage:/app/storage
    networks:
      - rumi_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    # 端口不对外暴露，只通过 nginx 内网访问

  # ── Frontend (nginx + React SPA) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rumi_frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    networks:
      - rumi_internal
    depends_on:
      backend:
        condition: service_healthy

volumes:
  rumi_storage:
    driver: local

networks:
  rumi_internal:
    driver: bridge
